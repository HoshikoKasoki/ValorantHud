<!DOCTYPE html>
<html>
<head>
  <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0);
    overflow: hidden;
  }

  .hud {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;   /* 👈 ancho pantalla */
    height: 100vh;  /* 👈 alto pantalla */
    object-fit: contain; /* o "cover" dependiendo */
    pointer-events: none;
  }
</style>
</head>
<body>

<img src="hud.png" class="hud">

</body>
</html>
